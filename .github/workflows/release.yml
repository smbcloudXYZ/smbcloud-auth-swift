name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify release package and example
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Show Swift version
        run: swift --version

      - name: Verify package
        run: make verify

  verify-apple-destinations:
    name: Verify release Apple destination build (${{ matrix.platform }})
    needs: verify
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ios
          - tvos
          - visionos

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Show Swift version
        run: swift --version

      - name: Verify destination build
        run: make verify-apple-destination PLATFORM=${{ matrix.platform }}

  github-release:
    name: Create GitHub release
    needs:
      - verify
      - verify-apple-destinations
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
